name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/agent/go.mod
          cache-dependency-path: |
            backend/agent/go.sum
            backend/gateway/go.sum
            backend/skills/doops-cli/go.sum

      - name: Test agent
        working-directory: backend/agent
        run: go test ./...

      - name: Test gateway
        working-directory: backend/gateway
        run: go test ./...

      - name: Test CLI
        working-directory: backend/skills/doops-cli
        run: go test ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web console
        run: pnpm exec tsc --noEmit

      - name: Build web console
        run: pnpm build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
