apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: doops-agent
  namespace: ai
  labels:
    app: doops-agent
spec:
  selector:
    matchLabels:
      app: doops-agent
  template:
    metadata:
      labels:
        app: doops-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: doops-agent
        image: docker.cnb.cool/l8ai/ai/doops.sh:v1.1
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: KUBECONFIG
          value: "/root/.kube/config"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        # doagent AI 引擎配置
        - name: DO_AGENT_PORT
          value: "9000"
        - name: DO_AGENT_URL
          value: "http://127.0.0.1:9000"
        - name: DO_AGENT_MODEL
          value: "openai/gpt-5.4"
        - name: API_BASE_URL
          value: "https://api.example.com/v1"
        # Registry 认证 (开箱即用构建推送)
        - name: REGISTRY_URL
          value: "registry.example.com"
        - name: REGISTRY_USER
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: username
        - name: REGISTRY_PASS
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: password
        volumeMounts:
        - name: k3s-kubeconfig
          mountPath: /etc/rancher/k3s/k3s.yaml
          readOnly: true
        - name: k3s-kubeconfig
          mountPath: /root/.kube/config
          readOnly: true
        # 统一持久化：所有运行时数据归 /root（源码、doagent 会话、Maven 缓存）
        - name: agent-home
          mountPath: /root
        - name: containerd-run
          mountPath: /run/containerd
        - name: containerd-lib
          mountPath: /var/lib/containerd
        - name: nerdctl-lib
          mountPath: /var/lib/nerdctl
        - name: doagent-config
          mountPath: /opt/doagent_config
          readOnly: true
        - name: nerdctl-bin
          mountPath: /usr/local/bin/nerdctl
          readOnly: true
        - name: nerdctl-real-bin
          mountPath: /usr/local/bin/nerdctl.real
          readOnly: true
        - name: buildkit-sock
          mountPath: /run/buildkit
      volumes:
      - name: k3s-kubeconfig
        hostPath:
          path: /etc/rancher/k3s/k3s.yaml
      # 统一持久化：宿主机 /home/iict/data/doops-agent-home => 容器 /root
      # 内含: ws/（源码）、.agent/（doagent 会话和配置）、.m2/（Maven）
      - name: agent-home
        hostPath:
          path: /home/iict/data/doops-agent-home
          type: DirectoryOrCreate
      - name: containerd-run
        hostPath:
          path: /run/containerd
          type: Directory
      - name: containerd-lib
        hostPath:
          path: /var/lib/containerd
          type: Directory
      - name: nerdctl-lib
        hostPath:
          path: /var/lib/nerdctl
          type: DirectoryOrCreate
      # doagent-config is the standard doops ask configuration entry.
      # Apply agent/agent-config.yaml or an environment-specific ConfigMap
      # generated from the private l8ai-secret repository before rolling pods.
      - name: doagent-config
        configMap:
          name: doagent-config
      - name: nerdctl-bin
        hostPath:
          path: /usr/local/bin/nerdctl
      - name: nerdctl-real-bin
        hostPath:
          path: /usr/local/bin/nerdctl.real
      - name: buildkit-sock
        hostPath:
          path: /run/buildkit
          type: DirectoryOrCreate
